<ion-content [fullscreen]="true">

  <div class="map-container-wrapper">

    <div #mapContainer id="map" style="width: 100%; height: 100%;"></div>

    <!-- Badge barrio -->
    <ion-badge *ngIf="datosIniciales" color="secondary" class="context-badge">
      {{ datosIniciales.barrio }}
    </ion-badge>

    <!-- Botón menú -->
    <button class="btn-menu" (click)="abrirMenu()">☰</button>

    <!-- Aviso modo colocación -->
    <div *ngIf="categoriaActiva && !asistenteVisible" class="aviso-edicion">
      {{ categoriaActiva.emoji }} Toca el mapa para colocar: {{ categoriaActiva.etiqueta }}
    </div>

    <!-- Aviso modo eliminación -->
    <div *ngIf="modoEliminarActivo" class="aviso-eliminar">
      🗑️ Toca el elemento que quieres eliminar
    </div>

    <!-- Asistente -->
    <app-asistente-mapa
      [hidden]="!asistenteVisible"
      [elementosColocados]="elementosColocados"
      [categoriaActiva]="categoriaActiva"
      (cerrar)="onAsistenteCerrado()">
    </app-asistente-mapa>

    <!-- Selector rápido -->
    <app-selector-rapido
      *ngIf="selectorRapidoVisible"
      (categoriaElegida)="onCategoriaRapidaElegida($event)"
      (cerrar)="selectorRapidoVisible = false">
    </app-selector-rapido>

    <!-- Barra flotante -->
    <div *ngIf="datosIniciales && !asistenteVisible && !selectorRapidoVisible" class="barra-flotante">
      <button class="barra-btn" (click)="selectorRapidoVisible = true">
        <span class="barra-icono">➕</span>
        <span class="barra-label">Añadir</span>
      </button>
      <button class="barra-btn" [class.danger-active]="modoEliminarActivo"
        [disabled]="elementosColocados === 0" (click)="onEliminar()">
        <span class="barra-icono">🗑️</span>
        <span class="barra-label">Eliminar</span>
      </button>
      <button class="barra-btn primary" [disabled]="elementosColocados === 0" (click)="onEnviar()">
        <span class="barra-icono">📤</span>
        <span class="barra-label">Enviar</span>
        <span class="barra-badge" *ngIf="elementosColocados > 0">{{ elementosColocados }}</span>
      </button>
    </div>

  </div>

</ion-content>
