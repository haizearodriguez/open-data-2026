<ion-content [fullscreen]="true">

  <app-chatbot *ngIf="!datosIniciales" (chatFinished)="onChatComponentFinished($event)"></app-chatbot>

  <div *ngIf="datosIniciales" class="map-container-wrapper" style="width: 100%; height: 100%; position: relative;">
    
    <div #mapContainer id="map" style="width: 100%; height: 100%;"></div>
    
    <ion-badge color="secondary" class="context-badge" style="position: absolute; top: 16px; left: 16px; z-index: 1000;">
      Barrio: {{ datosIniciales.barrio }} | Buscando: {{ datosIniciales.necesidad }}
    </ion-badge>

    <ion-fab slot="fixed" vertical="bottom" horizontal="end" style="z-index: 1000;">
      <ion-fab-button (click)="conmutarModoPlantar()" [color]="modoPlantar ? 'success' : 'medium'">
        <ion-icon [name]="modoPlantar ? 'leaf-outline' : 'hammer-outline'"></ion-icon>
      </ion-fab-button>
      
      <ion-fab-list side="top">
        <ion-fab-button (click)="seleccionarHerramienta('arbol')" color="light" title="Plantar Árbol">
          <ion-icon name="leaf-outline"></ion-icon>
        </ion-fab-button>
        <ion-fab-button (click)="seleccionarHerramienta('banco')" color="light" title="Colocar Banco">
          <ion-icon name="hammer-outline"></ion-icon>
        </ion-fab-button>
      </ion-fab-list>
    </ion-fab>

  </div>

</ion-content>
