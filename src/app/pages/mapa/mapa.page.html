<ion-content [fullscreen]="true">
  <div #mapContainer id="map" style="width: 100%; height: 100%;"></div>

  <ion-fab slot="fixed" vertical="bottom" horizontal="end">
    <ion-fab-button (click)="conmutarModoPlantar()" [color]="modoPlantar ? 'success' : 'medium'">
      <ion-icon [name]="modoPlantar ? 'leaf-outline' : 'hammer-outline'"></ion-icon>
    </ion-fab-button>
    
    <ion-fab-list side="top">
      <ion-fab-button (click)="seleccionarHerramienta('arbol')" color="light" title="Plantar Árbol">
        <ion-icon name="leaf-outline"></ion-icon>
      </ion-fab-button>
      <ion-fab-button (click)="seleccionarHerramienta('banco')" color="light" title="Colocar Banco">
        <ion-icon name="hammer-outline"></ion-icon>
      </ion-fab-button>
    </ion-fab-list>
  </ion-fab>
</ion-content>
