<ion-content [fullscreen]="true">

  <!-- Chatbot inicial de selección de barrio -->
  <app-chatbot
    *ngIf="!datosIniciales"
    (chatFinished)="onChatComponentFinished($event)">
  </app-chatbot>

  <!-- Vista del mapa -->
  <div *ngIf="datosIniciales" class="map-container-wrapper" style="width: 100%; height: 100%; position: relative;">

    <div #mapContainer id="map" style="width: 100%; height: 100%;"></div>

    <!-- Badge informativo -->
    <ion-badge color="secondary" class="context-badge">
      {{ datosIniciales.barrio }}
    </ion-badge>

    <!-- Aviso modo colocación (paso 2 del asistente) -->
    <div *ngIf="categoriaActiva" class="aviso-edicion">
      {{ categoriaActiva.emoji }} Toca el mapa para colocar: {{ categoriaActiva.etiqueta }}
    </div>

    <!-- Asistente paso a paso — aparece automáticamente -->
    <app-asistente-mapa
  [hidden]="!asistenteVisible"
  [elementosColocados]="elementosColocados"
  (asistenteEvento)="onAsistenteEvento($event)"
  (esperandoClic)="asistenteVisible = false"
  (cerrar)="onAsistenteCerrado()">
</app-asistente-mapa>

<!-- Botón para reabrir el asistente cuando está cerrado -->
<button
  *ngIf="!asistenteVisible"
  class="btn-reabrir-asistente"
  (click)="asistenteVisible = true">
  🤖
</button>

  </div>

</ion-content>
